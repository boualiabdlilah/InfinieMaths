<script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function fillExample(text) {
        document.getElementById("userQuestion").value = text;
    }

    async function sendQuestion() {
        const question = document.getElementById("userQuestion").value.trim();
        const responseBox = document.getElementById("assistantResponse");
        const sendBtn = document.getElementById("sendBtn");

        if (!question) {
            responseBox.innerHTML = "<p>Merci d’écrire une question avant d’envoyer.</p>";
            return;
        }

        responseBox.innerHTML = "<p>Chargement de la réponse...</p>";
        sendBtn.disabled = true;
        sendBtn.textContent = "Envoi...";

        try {
            const response = await fetch("https://infiniemaths-assistant-backend.onrender.com/assistant", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    question: question,
                    source: "InfinieMaths"
                })
            });

            const data = await response.json();

            let cleanedReply = data.reply || "";

            cleanedReply = cleanedReply
                .replace(/<div class="assistant-response-header">.*?<\/div>/gs, "")
                .replace(/<div class="assistant-response-body">/g, "")
                .replace(/<\/div>/g, "")
                .replace(/<p>/g, "")
                .replace(/<\/p>/g, "\n")
                .replace(/<br\s*\/?>/g, "\n")
                .replace(/&nbsp;/g, " ")
                .trim();

            cleanedReply = cleanedReply
                .replace(/\r\n/g, "\n")
                .replace(/\n[ \t]+\n/g, "\n\n")
                .replace(/\n{3,}/g, "\n\n")
                .replace(/[ \t]{2,}/g, " ")
                .replace(/^\s+|\s+$/g, "");

            cleanedReply = cleanedReply
                .replace(/\\\\$$/g, "\\[")                .replace(/\\\\$$/g, "\\]")
                .replace(/\\\\$$/g, "\\(")                .replace(/\\\\$$/g, "\\)")
                .replace(/\\\\frac/g, "\\frac")
                .replace(/\\\\sqrt/g, "\\sqrt")
                .replace(/\\\\times/g, "\\times")
                .replace(/\\\\cdot/g, "\\cdot")
                .replace(/^$$\s*$/gm, "\\[")                .replace(/^$$\s*$/gm, "\\]");

            responseBox.innerHTML = marked.parse(cleanedReply);

            renderMathInElement(responseBox, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false },
                    { left: "\$$", right: "\$$", display: false },
                    { left: "\$$", right: "\$$", display: true }
                ],
                throwOnError: false,
                strict: false
            });

        } catch (error) {
            responseBox.innerHTML = "<p>Le serveur assistant ne répond pas encore. Vérifie que le backend est bien lancé.</p>";
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = "Envoyer";
        }
    }
</script>
